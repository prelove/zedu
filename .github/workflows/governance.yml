name: governance

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npx openspec validate --all --strict --no-interactive
      - name: Encoding and traceability
        shell: pwsh
        run: |
          ./scripts/verify-encoding.ps1
          ./scripts/verify-traceability.ps1
