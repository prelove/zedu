name: governance

on:
  pull_request:
  push:
    branches: [main]

jobs:
  governance:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.8.0'
          cache: npm
      - run: npm ci
      - run: npx openspec validate --all --strict --no-interactive
      - name: Encoding and traceability
        shell: pwsh
        run: |
          ./scripts/verify-encoding.ps1
          ./scripts/verify-traceability.ps1

  foundation:
    needs: governance
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.3'
      - uses: actions/setup-node@v4
        with:
          node-version: '24.8.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Backend format, vet, test and build
        working-directory: backend
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Filter *.go -File | ForEach-Object FullName
          $formatDiff = & gofmt -d $files
          if ($LASTEXITCODE -ne 0 -or $formatDiff) { throw 'gofmt check failed' }
          go vet ./...
          go test ./... -count=1
          go build ./cmd/zedu-server
      - name: Backend race detector on Linux
        if: matrix.os == 'ubuntu-latest'
        working-directory: backend
        run: go test ./... -race -count=1
      - name: Frontend install, quality and build
        working-directory: frontend
        shell: pwsh
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run test:unit
          npm run test:coverage
          npm run build
          npm audit --audit-level=high
