schema: spec-driven
context: |
  项目：Zedu，小型教培机构的教务与经营闭环系统。
  唯一业务事实源：docs/2_prd/Zedu-PRD-Final-v3.1.md。
  当前里程碑：先完成并验收 MVP，再进入 V1；总进度见 docs/roadmap/MASTER_ROADMAP.md。
  MVP 已批准包含 Resend 邮件通知和付款凭证上传；正式老师结款属于 V1，MVP 不得暴露可执行入口。
  后端：Go/Gin/GORM/modernc SQLite；前端：Vue 3/Vite/TypeScript/Naive UI。
  金额禁止 float；账务写入必须单事务、幂等、可回滚；历史财务事实不可覆盖。
  文档中文优先；产品 locale 为 zh-CN/ja-JP/en-US；仓库 UTF-8，兼容 Windows 10 日文环境。
  所有任务遵循 PRD → Requirement → Scenario → Task → Test → Evidence，并遵循 docs/governance/GOVERNANCE.md 的统一 DoD。
rules:
  proposal:
    - 必须包含业务价值、范围、Non-Goals、依赖、风险和 PRD 章节引用。
    - 禁止把治理过程或测试活动伪装成用户能力。
  specs:
    - Requirement 必须使用 SHALL 或 MUST，Scenario 必须可由 Given/When/Then 验证。
    - 财务、安全、权限、幂等和失败恢复必须包含负向场景。
  design:
    - 必须说明事务边界、并发、失败补偿、安全、可观测性和被拒方案。
  tasks:
    - 每项任务必须标注依赖、输出、测试、证据路径和完成门禁，粒度以 15-90 分钟为目标。
    - 必须先记录失败测试，再实现并重新验证；commit 不是完成证据。
